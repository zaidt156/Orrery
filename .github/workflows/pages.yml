name: Deploy landing site to GitHub Pages

# Publishes docs/ (the self-contained landing page) to GitHub Pages. Runs on GitHub's own
# GITHUB_TOKEN, so no personal credentials are needed. configure-pages enables Pages on first run.
on:
  push:
    branches: [main]
    paths:
      - "docs/index.html"
      - "docs/.nojekyll"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
