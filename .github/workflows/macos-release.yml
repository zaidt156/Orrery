name: Build macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS desktop package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build macOS app package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-macos-app.sh
          ./scripts/build-macos-app.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orrery-macOS
          path: release/Orrery-macOS.zip

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/Orrery-macOS.zip
          overwrite_files: true

  macos-installer:
    name: Build macOS installer (DMG) · ${{ matrix.arch }}
    # Build on BOTH architectures so Intel Macs work too: macos-15-intel is an Intel (x64) runner
    # and macos-14/latest is Apple Silicon (arm64). Each runner produces its own-arch PyInstaller backend
    # + DMG; without this the DMG was arm64-only and simply would not launch on an Intel Mac.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build macOS installer
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-macos-installer.sh
          ./scripts/build-macos-installer.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orrery-macOS-Installer-${{ matrix.arch }}
          path: desktop/electron/dist/*.dmg

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/electron/dist/*.dmg
          overwrite_files: true
