<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 180" fill="none" role="img" aria-label="Orrery">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C1226"/>
      <stop offset="1" stop-color="#0A0F20"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#FFD98A"/>
      <stop offset="0.5" stop-color="#F2B14E"/>
      <stop offset="1" stop-color="#C8862A"/>
    </radialGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF2FF"/>
      <stop offset="1" stop-color="#9DB9F0"/>
    </linearGradient>
  </defs>

  <rect width="660" height="180" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="658" height="178" rx="25" stroke="#222D4A" stroke-width="1.5"/>

  <!-- starfield -->
  <circle cx="556" cy="40" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="612" cy="92" r="1.6" fill="#9DB9F0" opacity=".55"/>
  <circle cx="588" cy="140" r="1.1" fill="#F2B14E" opacity=".5"/>
  <circle cx="516" cy="150" r="1" fill="#fff" opacity=".35"/>

  <!-- orbital mark -->
  <g transform="translate(98 90)">
    <circle r="64" stroke="#1E2945" stroke-width="1.5"/>
    <g stroke="url(#ice)" stroke-width="2.4" opacity=".95">
      <ellipse rx="60" ry="23" transform="rotate(-24)"/>
      <ellipse rx="42" ry="16" transform="rotate(-24)" opacity=".8"/>
    </g>
    <circle r="15" fill="url(#sun)"/>
    <circle r="15" fill="none" stroke="#FFE6B0" stroke-width="0.8" opacity=".5"/>
    <!-- planets sit exactly on the orbit lines (theta=0/180 of each rotated ellipse) -->
    <circle cx="54.8" cy="-24.4" r="5.2" fill="#9DB9F0"/>
    <circle cx="-54.8" cy="24.4" r="3.4" fill="#E8EEFB"/>
    <circle cx="38.4" cy="-17.1" r="3" fill="#F2B14E"/>
  </g>

  <!-- wordmark -->
  <text x="196" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="700" fill="#F3F6FD" letter-spacing="-1.5">Orrery</text>
  <text x="199" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16.5" font-weight="500" fill="#8CA0C8" letter-spacing="3.2">LOCAL-FIRST AI WORKSPACE</text>
</svg>
