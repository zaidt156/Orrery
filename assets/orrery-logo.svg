      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#141C36"/>
    </linearGradient>
  </defs>
  <rect width="720" height="180" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="718" height="178" rx="21" stroke="#26314F" stroke-width="2"/>
  <!-- starfield -->
  <circle cx="592" cy="38" r="1.5" fill="#ffffff" opacity=".55"/>
  <circle cx="664" cy="118" r="1.6" fill="#9DB9F0" opacity=".65"/>
  <circle cx="548" cy="140" r="1.1" fill="#F2B14E" opacity=".6"/>
  <circle cx="694" cy="66" r="1.1" fill="#ffffff" opacity=".4"/>
