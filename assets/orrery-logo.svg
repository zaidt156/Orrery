    <circle cx="13.3" cy="18.2" r="2" fill="#F2B14E"/>
  </g>
  <!-- wordmark -->
  <text x="204" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="60" font-weight="700" fill="#E8ECF8" letter-spacing="-1">Orrery</text>
  <text x="206" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#9DB9F0">Local-first desktop AI workspace</text>
</svg>
